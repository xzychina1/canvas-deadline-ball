<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Deadline Ball</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <!-- 收起态:球 -->
    <div id="ball">
      <div id="count">—</div>
      <div id="label">ddl</div>
    </div>

    <!-- 展开态:卡片 -->
    <div id="card" hidden>
      <div id="card-header">
        <span id="header-title"><span id="header-name">未来 7 天</span> · <span id="card-count">0</span></span>
        <span id="gear" title="设置">⚙</span>
      </div>

      <!-- 列表视图 -->
      <div id="list-view">
        <div id="list"></div>
      </div>

      <!-- 设置视图 -->
      <div id="settings-view" hidden>
        <div class="settings-scroll">
          <div class="field">
            <label>刷新间隔(分钟)</label>
            <input id="refresh-input" type="number" min="1" value="30" />
          </div>

          <div class="section-title">数据源</div>
          <div id="source-list"></div>

          <div class="section-title">添加源</div>
          <div class="add-form">
            <input id="add-name" placeholder="名字(如 Canvas)" />
            <input id="add-url" placeholder="ICS 链接 https://....ics" />
            <div class="add-row2">
              <select id="add-kind">
                <option value="canvas">Canvas</option>
                <option value="ics">通用 ICS</option>
              </select>
              <input id="add-color" type="color" value="#e23b3b" />
              <button id="add-test">测试</button>
              <button id="add-btn">添加</button>
            </div>
            <div id="add-msg" class="msg"></div>
          </div>
        </div>
        <div class="settings-foot">
          <button id="settings-back">← 返回</button>
          <button id="settings-save" class="primary">保存</button>
        </div>
      </div>
    </div>
  </body>
</html>
