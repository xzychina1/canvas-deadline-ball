<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Deadline Ball</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <!-- 收起态:球 -->
    <div id="ball">
      <div id="ball-source"></div>
      <div id="count">—</div>
      <div id="label">--:--:--</div>
    </div>

    <!-- 展开态:卡片 -->
    <div id="card" hidden>
      <div id="card-header">
        <span id="header-title"
          ><span id="header-name">未来 7 天</span> ·
          <span id="card-count">0</span> ·
          <span id="card-countdown">--:--:--</span></span
        >
        <span class="header-btns">
          <span id="collapse" data-i18n="back">← 返回</span>
          <span id="help">📖</span>
          <span id="gear">⚙</span>
        </span>
      </div>

      <!-- 列表视图 -->
      <div id="list-view">
        <div id="list"></div>
      </div>

      <!-- 设置视图 -->
      <div id="settings-view" hidden>
        <div class="settings-scroll">
          <div class="top-links">
            <button id="open-guide" class="guide-link" data-i18n="guide">📖 使用说明</button>
            <button id="open-feedback" class="guide-link" data-i18n="feedback">💬 反馈</button>
          </div>
          <div class="field">
            <label data-i18n="language">语言</label>
            <select id="lang-select">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
          <div class="field">
            <label data-i18n="refreshInterval">刷新间隔(分钟)</label>
            <input id="refresh-input" type="number" min="1" value="30" />
          </div>

          <div class="section-title" data-i18n="sources">数据源</div>
          <div id="source-list"></div>

          <div class="section-title" data-i18n="addSource">添加源</div>
          <div class="add-form">
            <input id="add-name" data-i18n-ph="namePh" placeholder="名字(如 Canvas)" />
            <input
              id="add-url"
              data-i18n-ph="urlPh"
              placeholder="ICS 链接 https://....ics"
            />
            <div class="add-row2">
              <select id="add-kind">
                <option value="canvas">Canvas (ICS)</option>
                <option value="canvas-api" data-i18n="canvasApiKind">Canvas(登录免ICS)</option>
                <option value="google">Google Calendar</option>
                <option value="ics" data-i18n="genericIcs">通用 ICS</option>
              </select>
              <input id="add-color" type="color" value="#e23b3b" />
              <button id="add-test" data-i18n="test">测试</button>
              <button id="add-btn" data-i18n="add">添加</button>
            </div>
            <div id="add-msg" class="msg"></div>
          </div>

          <div class="section-title">Canvas auto-done (beta)</div>
          <div class="add-form">
            <div id="canvas-hint" class="hint" data-i18n="autoDoneHint">
              给你的 Canvas 源开自动完成:登录一次,已提交的作业会自动划掉。想直接按网址加 Canvas?用上面的「添加源 → Canvas(登录免ICS)」。
            </div>
            <div class="add-row2">
              <button id="canvas-login-btn">登录 Canvas</button>
              <button id="canvas-test-btn">测试连接</button>
              <button id="canvas-sync-btn">同步完成</button>
            </div>
            <div id="canvas-msg" class="msg"></div>
          </div>
        </div>
        <div class="settings-foot">
          <button id="settings-back" data-i18n="back">← 返回</button>
          <button id="settings-save" class="primary" data-i18n="save">保存</button>
        </div>
      </div>

      <!-- 使用说明 -->
      <div id="guide-view" hidden>
        <div class="settings-scroll" id="guide-body"></div>
        <div class="settings-foot">
          <button id="guide-back" data-i18n="back">← 返回</button>
          <button id="guide-feedback" data-i18n="feedback">💬 反馈</button>
        </div>
      </div>

      <!-- 首次使用向导 -->
      <div id="wizard-view" hidden>
        <div class="wizard-body">
          <div id="wizard-title" class="wizard-title" data-i18n="wizardTitle">👋 添加你的 Canvas</div>
          <input id="wizard-url" data-i18n-ph="wizardPh" placeholder="粘贴 Canvas 网址,或 ICS 日历链接" />
          <button id="wizard-go" class="primary" data-i18n="wizardGo">开始</button>
          <div id="wizard-msg" class="msg"></div>
          <button id="wizard-advanced" class="linklike" data-i18n="wizardAdvanced">高级设置 ›</button>
        </div>
      </div>
    </div>
  </body>
</html>
